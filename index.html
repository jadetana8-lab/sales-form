<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>ใบรายการขายประจำวัน</title>
<!-- ... โค้ด CSS และ Header เดิมของพี่เจตทั้งหมด ... -->
<style>
  /* โค้ด CSS เดิมของพี่เจตทั้งหมดที่ส่งมา */
  /* (แปะ CSS เดิมของพี่เจตใส่ตรงนี้ได้เลยค่ะ) */
</style>
</head>
<body>

<!-- เนื้อหา HTML ทั้งหมดของพี่เจต -->
<!-- (นำเนื้อหา HTML เดิมตั้งแต่ <body> จนถึง <script> มาวางที่นี่ค่ะ) -->

<script>
// =====================================================================
// ลิงก์ Web App (พี่เจตใช้ของเดิมได้เลยค่ะ)
const API_URL = "https://script.google.com/macros/s/AKfycbx27a3ZCoBP18F98dNrEbX9dk0DhGtmxp8K3kQIttaWqRxv7ilCKUOuhf3C4Fu1vQTv/exec";

// ฟังก์ชันค้นหาพนักงานที่แก้ไขให้ดึงข้อมูลลงช่อง ID เดิมของพี่เจต
document.getElementById('empCode').addEventListener('input', function() {
    const code = this.value;
    if (code.length < 3) return; // หรือตามความยาวรหัสพนักงานจริง

    fetch(`${API_URL}?action=getEmployee&empCode=${code}`)
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                document.getElementById('afFirstName').innerText = result.data.name;
                document.getElementById('afLastName').innerText = result.data.lastname || "";
                document.getElementById('afNickname').innerText = result.data.nickname;
                document.getElementById('afBranch').innerText = result.data.branchName;
                document.getElementById('afBranchCode').innerText = result.data.branchCode;
                document.getElementById('afEmpCodeRow').style.display = 'flex';
                document.getElementById('afEmpCode').innerText = code;
                showToast("ดึงข้อมูลพนักงานเรียบร้อย");
            } else {
                showToast("ไม่พบข้อมูลพนักงาน");
            }
        });
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ... ใส่ JavaScript ส่วนที่เหลือของพี่เจตต่อจากตรงนี้ได้เลยค่ะ ...
</script>
</body>
</html>
