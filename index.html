<!-- โครงสร้างแสดงผลข้อมูลพนักงาน (คงรูปเลย์เอาต์เดิมของพี่เจตไว้) -->
<div class="employee-section">
  <div class="form-group">
    <label for="empCode">รหัสพนักงาน</label>
    <input type="text" id="empCode" class="form-control" placeholder="กรอกรหัสพนักงาน เช่น 304" oninput="searchEmployee()">
    <small id="statusMessage" class="form-text text-muted">กรุณากรอกรหัสพนักงานเพื่อดึงข้อมูล</small>
  </div>

  <div class="card mt-3">
    <div class="card-body">
      <p><strong>ชื่อ-นามสกุล:</strong> <span id="empName">-</span></p>
      <p><strong>ชื่อเล่น:</strong> <span id="empNickname">-</span></p>
      <p><strong>รหัสสาขา:</strong> <span id="branchCode">-</span></p>
      <p><strong>ชื่อสาขา:</strong> <span id="branchName">-</span></p>
    </div>
  </div>
</div>

<!-- ระบบควบคุมการส่งสัญญานไปหลังบ้าน (JavaScript เวอร์ชันใหม่) -->
<script>
// ตั้งค่าตัวแปรระบบตามที่พี่เจตให้มา
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwA7wu8vbMCa1lWxXhiosOOB6nO2TIQS4dhgPjYz8ZdoEx2ZqLNV9LB6snN73igLgYR/exec";
const API_KEY = "AQ.Ab8RN6IkB0O6am2b2A6hwuswMQHRKkzxcwUpgHIKLkA1XAM9rw";

let searchTimeout;

function searchEmployee() {
  const empCodeInput = document.getElementById('empCode').value.trim();
  const statusMessage = document.getElementById('statusMessage');
  
  // ล้างข้อมูลเก่าบนหน้าจอเวลากำลังพิมพ์ใหม่
  clearEmployeeFields();

  if (!empCodeInput) {
    statusMessage.innerText = "กรุณากรอกรหัสพนักงานเพื่อดึงข้อมูล";
    statusMessage.style.color = "#6c757d";
    return;
  }

  // ใช้ Debounce หน่วงเวลาพิมพ์ (ป้องกันระบบยิงถี่เกินไปตอนกำลังพิมพ์ตัวเลข)
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    statusMessage.innerText = "กำลังค้นหาข้อมูล...";
    statusMessage.style.color = "#007bff";

    // ยิง API ไปหา Google Apps Script หลังบ้าน พร้อมส่ง API Key ไปยืนยันตัวตน
    const finalUrl = `${WEB_APP_URL}?action=getEmployee&empCode=${encodeURIComponent(empCodeInput)}&apiKey=${API_KEY}`;

    fetch(finalUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error('เครือข่ายมีปัญหา ไม่สามารถติดต่อระบบหลังบ้านได้');
        }
        return response.json();
      })
      .then(result => {
        if (result.status === 'success') {
          // แสดงข้อมูลลงฟอร์มเมื่อเจอข้อมูล
          document.getElementById('empName').innerText = result.data.name;
          document.getElementById('empNickname').innerText = result.data.nickname;
          document.getElementById('branchCode').innerText = result.data.branchCode;
          document.getElementById('branchName').innerText = result.data.branchName;
          
          statusMessage.innerText = "ดึงข้อมูลพนักงานสำเร็จ";
          statusMessage.style.color = "#28a745";
        } else if (result.status === 'not_found') {
          statusMessage.innerText = "ไม่พบรหัสพนักงานในระบบ";
          statusMessage.style.color = "#dc3545";
        } else {
          statusMessage.innerText = `ข้อผิดพลาด: ${result.message}`;
          statusMessage.style.color = "#dc3545";
        }
      })
      .catch(error => {
        console.error('Error:', error);
        statusMessage.innerText = "การเชื่อมต่อขัดข้อง (โปรดเช็กหน้าต่าง Console)";
        statusMessage.style.color = "#dc3545";
      });
  }, 500); // ทำงานหลังจากพี่เจตพิมพ์หยุดนิ่งไป 0.5 วินาทีค่ะ
}

function clearEmployeeFields() {
  document.getElementById('empName').innerText = "-";
  document.getElementById('empNickname').innerText = "-";
  document.getElementById('branchCode').innerText = "-";
  document.getElementById('branchName').innerText = "-";
}
</script>
