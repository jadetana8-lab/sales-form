<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily sales report</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; padding-top: 2rem; }
    .container { max-width: 600px; background: #ffffff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

<div class="container">
  <h3>📝 Daily sales report.</h3>
  <p class="text-muted">Thai Yuh Company Limited (thaiyuh)</p>
  <hr>

  <!-- ส่วนค้นหาพนักงาน -->
  <label><strong>Employee ID</strong></label>
  <input type="text" id="empCode" class="form-control" placeholder="Enter ID" oninput="searchEmployee()">
  <small id="statusMessage" class="text-danger">System error: undefined</small>

  <div class="card mt-3">
    <div class="card-body">
      <h5>📋 Employee Information</h5>
      <p><strong>Name-Surname:</strong> <span id="empName">-</span></p>
      <p><strong>nickname:</strong> <span id="empNickname">-</span></p>
      <p><strong>Branch code:</strong> <span id="branchCode">-</span></p>
      <p><strong>Branch Name:</strong> <span id="branchName">-</span></p>
    </div>
  </div>

  <!-- ส่วนรายการขาย (ที่หายไป) -->
  <hr>
  <h5>💰 Sales Details</h5>
  <div class="form-group">
    <label>Sales Amount</label>
    <input type="number" id="salesAmount" class="form-control" placeholder="0.00">
  </div>
  <button class="btn btn-primary" onclick="submitSales()">Submit Sales</button>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwA7wu8vbMCa1lWxXhiosOOB6nO2TIQS4dhgPjYz8ZdoEx2ZqLNV9LB6snN73igLgYR/exec";
const API_KEY = "AQ.Ab8RN6IkB0O6am2b2A6hwuswMQHRKkzxcwUpgHIKLkA1XAM9rw";

// ฟังก์ชันค้นหาพนักงาน
function searchEmployee() {
  const empCode = document.getElementById('empCode').value.trim();
  const statusMessage = document.getElementById('statusMessage');
  if(!empCode) return;

  statusMessage.innerText = "กำลังค้นหา...";
  statusMessage.style.color = "blue";

  fetch(`${WEB_APP_URL}?action=getEmployee&empCode=${encodeURIComponent(empCode)}&apiKey=${API_KEY}`)
    .then(res => res.json())
    .then(result => {
      if(result.status === 'success') {
        document.getElementById('empName').innerText = result.data.name;
        document.getElementById('empNickname').innerText = result.data.nickname;
        document.getElementById('branchCode').innerText = result.data.branchCode;
        document.getElementById('branchName').innerText = result.data.branchName;
        statusMessage.innerText = "พบข้อมูล";
        statusMessage.style.color = "green";
      } else {
        statusMessage.innerText = "ไม่พบข้อมูล";
        statusMessage.style.color = "red";
      }
    })
    .catch(err => statusMessage.innerText = "Error: " + err);
}

// ฟังก์ชันส่งรายการขาย (พี่เจตสามารถเพิ่มเติมคำสั่งส่งข้อมูลต่อได้เลยค่ะ)
function submitSales() {
  alert("บันทึกรายการขายเรียบร้อยแล้วค่ะ!");
}
</script>
</body>
</html>
