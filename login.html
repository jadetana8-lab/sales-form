<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>เข้าสู่ระบบ - ระบบพนักงาน</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D5FA8">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ระบบพนักงาน">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{
    --teal:#1D5FA8; --teal-dark:#123A66; --teal-soft:#DCEAFB;
    --paper:#EEF5FC; --ink:#1B2B29; --muted:#7A756A; --line:#DDD6C7;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Noto Sans Thai',sans-serif; background:var(--teal); min-height:100vh; }

  /* ---------- Splash ---------- */
  #splash{
    position:fixed; inset:0; background:var(--teal);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; transition:opacity .4s ease;
  }
  #splash img{ width:96px; height:96px; border-radius:24px; box-shadow:0 8px 24px rgba(0,0,0,.2); }
  #splash h1{ color:#fff; font-family:'Kanit',sans-serif; font-size:20px; margin:16px 0 4px; }
  #splash p{ color:#CFE0F5; font-size:12.5px; margin:0; }
  .spinner{
    margin-top:26px; width:26px; height:26px; border-radius:50%;
    border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #splash.hide{ opacity:0; pointer-events:none; }

  /* ---------- Login ---------- */
  .wrap{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 24px; text-align:center;
  }
  .logo-box{ width:88px; height:88px; border-radius:22px; margin-bottom:18px; box-shadow:0 8px 24px rgba(0,0,0,.15); }
  .wrap h2{ color:#fff; font-family:'Kanit',sans-serif; font-size:19px; margin:0 0 26px; }
  .card{
    background:#fff; border-radius:18px; padding:24px 22px; width:100%; max-width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,.15); text-align:left;
  }
  .card label{ font-size:12.5px; color:var(--muted); display:block; margin-bottom:6px; }
  .card input[type=text]{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:12px 14px;
    font-size:15px; font-family:'Noto Sans Thai',sans-serif; margin-bottom:14px;
  }
  .card input:focus{ outline:none; border-color:var(--teal); }
  .remember{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted); margin-bottom:18px; }
  .remember input{ width:auto; }
  .login-btn{
    width:100%; background:var(--teal); color:#fff; border:none; border-radius:12px;
    padding:13px; font-family:'Noto Sans Thai',sans-serif; font-weight:700; font-size:15px; cursor:pointer;
  }
  .login-btn:disabled{ background:#B9C7DA; }
  .err-msg{ color:#B3382C; font-size:12.5px; margin-top:10px; text-align:center; display:none; }
  .err-msg.show{ display:block; }
  .foot-link{ text-align:center; margin-top:18px; font-size:12px; color:#DCEAFB; }
  .greet{ font-family:'Kanit',sans-serif; font-size:16px; color:var(--teal-dark); margin-bottom:16px; text-align:center; }
  .back-link{ text-align:center; margin-top:14px; font-size:12.5px; color:var(--teal); cursor:pointer; text-decoration:underline; }
  .card input[type=text].pin{ letter-spacing:6px; text-align:center; font-family:'Kanit',sans-serif; font-size:20px; }
</style>
</head>
<body>

<div id="splash">
  <img src="icon-192.png" alt="logo">
  <h1>ระบบพนักงาน</h1>
  <p>ใช้งานง่าย รวดเร็ว เชื่อถือได้</p>
  <div class="spinner"></div>
</div>

<div class="wrap">
  <img class="logo-box" src="icon-192.png" alt="logo">
  <h2>เข้าสู่ระบบ</h2>
  <p style="opacity:.5; font-size:10px; margin:-18px 0 18px;">v6-login-auth-2026-07-23</p>
  <div class="card">
    <label>รหัสพนักงาน</label>
    <input type="text" id="empCode" placeholder="เช่น 0001" autocomplete="off">
    <label class="remember"><input type="checkbox" id="rememberDevice" checked> จดจำอุปกรณ์นี้</label>

    <div id="passwordArea" style="display:none;">
      <div class="greet" id="greetText"></div>

      <div id="newPassBlock" style="display:none;">
        <label>ตั้งรหัสผ่าน (ตัวเลข 4 หลัก) — เข้าครั้งแรก</label>
        <input type="text" id="newPass" class="pin" inputmode="numeric" maxlength="4" autocomplete="off">
        <label>ยืนยันรหัสผ่านอีกครั้ง</label>
        <input type="text" id="newPassConfirm" class="pin" inputmode="numeric" maxlength="4" autocomplete="off">
      </div>

      <div id="existingPassBlock" style="display:none;">
        <label>รหัสผ่าน</label>
        <input type="text" id="existingPass" class="pin" inputmode="numeric" maxlength="4" autocomplete="off">
      </div>
    </div>

    <button class="login-btn" id="mainBtn" onclick="handleMainButton()">ถัดไป</button>
    <div class="err-msg" id="errMsg"></div>
  </div>
  <div class="foot-link">ลืมรหัสผ่าน? ติดต่อหัวหน้าสาย/แอดมิน</div>
</div>

<script>
const SESSION_KEY = 'staffSession';

function getSession(){
  try{
    return JSON.parse(localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY) || 'null');
  }catch(e){ return null; }
}

// ถ้าล็อกอินค้างอยู่แล้ว (จดจำอุปกรณ์นี้ไว้) ข้ามหน้า login ไปที่ dashboard เลย
const existing = getSession();
if(existing){
  window.location.href = 'dashboard.html';
} else {
  setTimeout(()=>{ document.getElementById('splash').classList.add('hide'); }, 700);
}

function isValidPin(v){ return /^[0-9]{4}$/.test(v); }

function showErr(msg){
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function clearErr(){
  document.getElementById('errMsg').classList.remove('show');
}

let pendingEmployee = null; // ผลจาก lookupEmployee ของรหัสพนักงานที่เช็คผ่านล่าสุด
let checkedCode = null;     // รหัสพนักงานที่ pendingEmployee อ้างถึง (ไว้เทียบว่าถูกแก้ไหม)

function resetPasswordArea(){
  pendingEmployee = null;
  checkedCode = null;
  document.getElementById('passwordArea').style.display = 'none';
  document.getElementById('mainBtn').textContent = 'ถัดไป';
}

// ถ้าแก้รหัสพนักงานหลังจากเช็คผ่านไปแล้ว ให้รีเซ็ตช่องรหัสผ่านกลับไปขั้นแรกอัตโนมัติ
document.getElementById('empCode').addEventListener('input', ()=>{
  if(pendingEmployee && document.getElementById('empCode').value.trim() !== checkedCode){
    resetPasswordArea();
    clearErr();
  }
});

// ปุ่มเดียวขับเคลื่อนทุกขั้นตอน: ยังไม่เช็ครหัสพนักงาน -> เช็คก่อน / เช็คแล้ว -> ตั้ง/ยืนยันรหัสผ่าน
function handleMainButton(){
  if(!pendingEmployee){
    doCheckEmployee();
  } else if(pendingEmployee.hasPassword){
    doVerifyPassword();
  } else {
    doSetPassword();
  }
}

function doCheckEmployee(){
  const code = document.getElementById('empCode').value.trim();
  clearErr();
  if(!code){ showErr('กรุณากรอกรหัสพนักงาน'); return; }

  const btn = document.getElementById('mainBtn');
  btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';

  fetch(`${API_URL}?action=lookupEmployee&code=${encodeURIComponent(code)}`)
    .then(r=>{
      if(!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
      return r.json();
    })
    .then(res=>{
      btn.disabled = false;
      if(!res.found){
        btn.textContent = 'ถัดไป';
        showErr('ไม่พบรหัสพนักงานนี้ กรุณาตรวจสอบอีกครั้ง');
        return;
      }
      if(res.status === 'inactive'){
        btn.textContent = 'ถัดไป';
        showErr('บัญชีนี้ถูกระงับการใช้งาน กรุณาติดต่อแอดมิน');
        return;
      }
      pendingEmployee = res;
      checkedCode = code;
      revealPasswordArea(btn);
    })
    .catch(err=>{
      btn.disabled = false; btn.textContent = 'ถัดไป';
      showErr('เชื่อมต่อระบบไม่สำเร็จ: ' + (err && err.message ? err.message : String(err)));
    });
}

function revealPasswordArea(btn){
  document.getElementById('passwordArea').style.display = 'block';
  document.getElementById('greetText').textContent = 'สวัสดีคุณ ' + (pendingEmployee.nickname || pendingEmployee.name);

  if(pendingEmployee.hasPassword){
    document.getElementById('newPassBlock').style.display = 'none';
    document.getElementById('existingPassBlock').style.display = 'block';
    const p = document.getElementById('existingPass');
    p.value = ''; p.focus();
    btn.textContent = 'เข้าสู่ระบบ';
  } else {
    document.getElementById('newPassBlock').style.display = 'block';
    document.getElementById('existingPassBlock').style.display = 'none';
    document.getElementById('newPass').value = '';
    document.getElementById('newPassConfirm').value = '';
    document.getElementById('newPass').focus();
    btn.textContent = 'ตั้งรหัสผ่านและเข้าสู่ระบบ';
  }
}

function finalizeLogin(){
  const session = {
    empCode: pendingEmployee.empCode, name: pendingEmployee.name, nickname: pendingEmployee.nickname,
    branch: pendingEmployee.branch, branchCode: pendingEmployee.branchCode,
    permissionLevel: pendingEmployee.permissionLevel,
    loginAt: new Date().toISOString(),
  };
  const remember = document.getElementById('rememberDevice').checked;
  const store = remember ? localStorage : sessionStorage;
  store.setItem(SESSION_KEY, JSON.stringify(session));
  window.location.href = 'dashboard.html';
}

function doSetPassword(){
  clearErr();
  const p1 = document.getElementById('newPass').value.trim();
  const p2 = document.getElementById('newPassConfirm').value.trim();
  if(!isValidPin(p1)){ showErr('รหัสผ่านต้องเป็นตัวเลข 4 หลัก'); return; }
  if(p1 !== p2){ showErr('รหัสผ่านทั้งสองช่องไม่ตรงกัน กรุณากรอกใหม่'); return; }

  const btn = document.getElementById('mainBtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'setPassword', data: { empCode: pendingEmployee.empCode, password: p1 } })
  })
    .then(r=>r.json())
    .then(res=>{
      btn.disabled = false;
      if(res.success){ finalizeLogin(); }
      else { btn.textContent = 'ตั้งรหัสผ่านและเข้าสู่ระบบ'; showErr(res.error || 'ตั้งรหัสผ่านไม่สำเร็จ'); }
    })
    .catch(err=>{
      btn.disabled = false; btn.textContent = 'ตั้งรหัสผ่านและเข้าสู่ระบบ';
      showErr('เชื่อมต่อระบบไม่สำเร็จ: ' + (err && err.message ? err.message : String(err)));
    });
}

function doVerifyPassword(){
  clearErr();
  const p = document.getElementById('existingPass').value.trim();
  if(!isValidPin(p)){ showErr('กรุณากรอกรหัสผ่าน 4 หลัก'); return; }

  const btn = document.getElementById('mainBtn');
  btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...';

  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'verifyPassword', data: { empCode: pendingEmployee.empCode, password: p } })
  })
    .then(r=>r.json())
    .then(res=>{
      btn.disabled = false;
      if(res.success){ finalizeLogin(); }
      else { btn.textContent = 'เข้าสู่ระบบ'; showErr(res.error || 'รหัสผ่านไม่ถูกต้อง'); }
    })
    .catch(err=>{
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
      showErr('เชื่อมต่อระบบไม่สำเร็จ: ' + (err && err.message ? err.message : String(err)));
    });
}

// จำกัดให้พิมพ์ได้แค่ตัวเลขในช่องรหัสผ่าน (UX เท่านั้น ไม่ใช่การตรวจสอบหลัก)
['newPass','newPassConfirm','existingPass'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,4);
  });
});

// Enter ที่ช่องไหนก็ได้ ให้ทำงานเหมือนกดปุ่มหลัก (เช็ครหัส หรือ ยืนยันรหัสผ่าน แล้วแต่ขั้นตอนปัจจุบัน)
['empCode','newPassConfirm','existingPass'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', e=>{
    if(e.key === 'Enter') handleMainButton();
  });
});
</script>
</body>
</html>
